site_name: assaylab
site_description: >-
  Validation intelligence for CI — failure-signature RCA, ML flaky-vs-real
  classification, and attested test-selection with a verifiable confidence bound.
site_url: https://amitpatole.github.io/assaylab/
repo_url: https://github.com/amitpatole/assaylab
repo_name: amitpatole/assaylab
copyright: MIT © Amit Patole
docs_dir: docs

theme:
  name: material
  palette:
    scheme: default          # Warm Paper — light, editorial
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            preload_modules: [agentsensory]
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            filters: ["!^_"]

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Root-cause analysis: rca.md
  - Attested selection: selection.md
  - Test generation & self-healing: llm.md
  - API: api.md
