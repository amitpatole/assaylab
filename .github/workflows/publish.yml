name: Publish

# Tag-triggered release via OIDC Trusted Publishing (no long-lived API tokens). Configure the
# trusted publisher for `assaylab` on PyPI + TestPyPI first (project -> Publishing -> add this repo
# + workflow `publish.yml`).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # The publish jobs use OIDC Trusted Publishing. They run only once the trusted
  # publisher is configured on (Test)PyPI and the repo variable
  # ENABLE_TRUSTED_PUBLISH=true is set. Until then they're skipped so a release
  # tag still goes green; the build job always validates the artifacts.
  publish-testpypi:
    needs: build
    if: ${{ vars.ENABLE_TRUSTED_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    needs: publish-testpypi
    if: ${{ vars.ENABLE_TRUSTED_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
